        row.appendChild(input);
        row.appendChild(valSpan);
        body.appendChild(row);
      }
    }

    // ===================================================
    // VFX Refresh Functions
    // ===================================================

    function refreshGrowth() {
      if (!sceneState || !allGroups.length) return;
      clearGarden(sceneState.scene);
      plantGroups = renderGarden(
        sceneState.scene, allGroups, Object.values(noteById)
      );
      buildSideLabels(allGroups);
      // Re-apply visibility filters (hide singles + timeline)
      updateTimelineVisibility();
    }

    function refreshTheme() {
      const root = document.documentElement.style;
      root.setProperty('--bg', VFX.uiBg.val);
      root.setProperty('--bg-panel', VFX.uiBgPanel.val + 'e0');  // add alpha for transparency
      root.setProperty('--border', VFX.uiBorder.val);
      root.setProperty('--text', VFX.uiText.val);
      root.setProperty('--text-dim', VFX.uiTextDim.val);
      root.setProperty('--text-bright', VFX.uiTextBright.val);
      // Also update Three.js scene background
      if (sceneState) {
        sceneState.scene.background = new THREE.Color(VFX.uiBg.val);
      }
    }

    function dispatchRefresh(key) {
      const handlers = {
        plants: refreshPlants,
        growth: refreshGrowth,
        theme: refreshTheme,
        scene: refreshScene,
        dust: refreshDust,
        pollen: refreshPollen,
        labels: () => { if (allGroups.length) buildSideLabels(allGroups); },
      };
      if (handlers[key]) handlers[key]();
    }

    function refreshPlants() {
      if (!sceneState || !allGroups.length) return;

      clearGarden(sceneState.scene);

      plantGroups = renderGarden(
        sceneState.scene, allGroups, Object.values(noteById)
      );
      buildSideLabels(allGroups);
      refreshDust();
      refreshPollen();
    }

    function refreshScene() {
      if (!sceneState) return;
      sceneState.bloomPass.strength = VFX.bloomStrength.val;
      sceneState.bloomPass.radius = VFX.bloomRadius.val;
      sceneState.bloomPass.threshold = VFX.bloomThreshold.val;
      const newDustColor = new THREE.Color(VFX.dustColor.val);
      sceneState.scene.traverse(obj => {
        if (obj.userData && obj.userData.type === 'dust') {
          obj.traverse(child => {
            if (child.material) {
              child.material.opacity = VFX.gridOpacity.val;
              child.material.color.copy(newDustColor);
            }
          });
        }
      });
    }

    function getDustRadius() {
      let maxR = 10;
      for (const g of plantGroups) {
        const d = Math.sqrt(g.position.x ** 2 + g.position.z ** 2);
        if (d > maxR) maxR = d;
      }
      return maxR + 8; // padding beyond outermost plant
    }

    function refreshDust() {
      if (!sceneState) return;
      const scene = sceneState.scene;
      // Remove old dust group
      const toRemove = [];
      scene.traverse(obj => {
        if (obj.userData && obj.userData.type === 'dust') toRemove.push(obj);
      });
      for (const obj of toRemove) {
        obj.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) child.material.dispose();
        });
        scene.remove(obj);
      }
      // Rebuild with current size, radius covers all plants
      const dustGroup = new THREE.Group();
      dustGroup.userData = { type: 'dust' };
      const dustRadius = getDustRadius();
      const dustDensity = VFX.dustDensity.val;
      const dustCount = Math.max(200, Math.round(Math.PI * dustRadius * dustRadius * dustDensity));
      const dustColor = new THREE.Color(VFX.dustColor.val);
      for (let i = 0; i < dustCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * dustRadius;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const size = VFX.dustSize.val + Math.random() * VFX.dustSize.val;
        const triGeo = new THREE.BufferGeometry();
        const h = size, hw = size * 0.5;
        triGeo.setAttribute('position', new THREE.Float32BufferAttribute([
          -hw, 0, 0,   hw, 0, 0,   0, 0, h
        ], 3));
        const triMat = new THREE.MeshBasicMaterial({
          color: dustColor,
          transparent: true,
          opacity: VFX.gridOpacity.val,
          side: THREE.DoubleSide,
        });
        const tri = new THREE.Mesh(triGeo, triMat);
        tri.position.set(x, 0.01, z);
        tri.rotation.y = Math.random() * Math.PI * 2;
        dustGroup.add(tri);
      }
      scene.add(dustGroup);
    }

    // ===================================================
    // Pollen Particle System
    // ===================================================

    function computePlantBounds() {
      plantBounds = [];
      for (let i = 0; i < plantGroups.length; i++) {
        const plant = plantGroups[i];
        const groupName = plant.userData?.groupData?.name || `plant-${i}`;
        const box = new THREE.Box3().setFromObject(plant);
        box.expandByScalar(0.5); // padding for easier entry
        const palIdx = cachedPlantStyles[groupName]?.leafPalIndex ?? 0;
        const leafColor = getPastelColors()[palIdx];
        plantBounds.push({ box, leafColor, plantIndex: i, plantName: groupName });
      }
    }

    function computeNotesByPlant() {
      notesByPlant = {};
      let totalLeaves = 0;
      for (let i = 0; i < plantGroups.length; i++) {
        const plant = plantGroups[i];
        const ids = [];
        plant.traverse(child => {
          if (child.isMesh && child.userData.type === 'leaf' && child.userData.noteId != null) {
            ids.push(child.userData.noteId);
          }
        });
        notesByPlant[i] = ids;
        totalLeaves += ids.length;
      }
      console.log(`Notes by plant: ${totalLeaves} leaves across ${plantGroups.length} plants`);
    }

    // Debug: call window.__pollenDebug() in console to diagnose proximity issues
    window.__pollenDebug = function() {
      if (!pollenSystem) return console.log('No pollen system');
      console.log(`=== POLLEN DEBUG ===`);
      const totalNotes = Object.values(notesByPlant).reduce((s, a) => s + a.length, 0);
      console.log(`Notes by plant: ${totalNotes} across ${Object.keys(notesByPlant).length} plants`);
      console.log(`Embeddings: ${noteEmbeddings ? noteEmbeddings.size : 'null'}`);
      console.log(`Detect radius: ${XPOLLEN.detectRadius.val}`);
      console.log(`Seen pairs: ${seenPairs.size}, Ideas: ${ideaCount}`);

      const p0 = pollenSystem.particles[0];
      const pos = p0.mesh.position;
      console.log(`Particle 0 pos: (${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)})`);
      console.log(`Particle 0 visited: ${p0.visited.size} plants`);
      for (const [plantIdx, info] of p0.visited) {
        console.log(`  visited: plantIdx=${plantIdx} plant=${info.plantName} noteId=${info.noteId}`);
      }
      // Check all particles for multi-plant visits
      let multiPlantCount = 0;
      for (const p of pollenSystem.particles) {
        if (p.visited.size >= 2) multiPlantCount++;
      }
      console.log(`Particles with 2+ plants visited: ${multiPlantCount} / ${pollenSystem.particles.length}`);

      // Show plant bounds with distance-to-box for particle 0
      for (const pb of plantBounds) {
        const c = new THREE.Vector3();
        pb.box.getCenter(c);
        const boxDist = pb.box.distanceToPoint(pos);
        const inside = pb.box.containsPoint(pos);
        console.log(`Plant "${pb.plantName}" boxDist=${boxDist.toFixed(2)}${inside ? ' INSIDE' : ''} center=(${c.x.toFixed(1)}, ${c.y.toFixed(1)}, ${c.z.toFixed(1)})`);
      }
    };

    // ===================================================
    // Embedding & LLM Infrastructure
    // ===================================================

    function getApiKey() {
      return document.getElementById('api-key-input')?.value?.trim()
        || localStorage.getItem('notes-network-api-key') || null;
    }

    async function embedTexts(texts, apiKey) {
      const model = 'gemini-embedding-001';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:batchEmbedContents?key=${apiKey}`;
      const batchSize = 20;
      const allEmbeddings = [];
      for (let i = 0; i < texts.length; i += batchSize) {
        const batch = texts.slice(i, i + batchSize);
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            requests: batch.map(t => ({ model: `models/${model}`, content: { parts: [{ text: t }] } }))
          }),
        });
        if (!resp.ok) throw new Error(`Embedding API error: ${resp.status} ${await resp.text()}`);
        const data = await resp.json();
        for (const emb of data.embeddings) {
          allEmbeddings.push(new Float32Array(emb.values));
        }
      }
      return allEmbeddings;
    }

    async function ensureEmbeddings(notes) {
      if (noteEmbeddings && noteEmbeddings.size === notes.length) return;
      const apiKey = getApiKey();
      if (!apiKey) return;

      // Try loading from IndexedDB
      const session = await loadSession();
      if (session?.embeddings) {
        noteEmbeddings = new Map();
        for (const [id, arr] of Object.entries(session.embeddings)) {
          // Keys from JSON are always strings; coerce to number if numeric to match note.id types
          const key = isNaN(id) ? id : Number(id);
          noteEmbeddings.set(key, new Float32Array(arr));
        }
        if (noteEmbeddings.size === notes.length) return;
      }

      // Compute fresh embeddings
      setBootStage('EMBEDDING...', `computing vectors for ${notes.length} notes`);
      const texts = notes.map(n => `${n.name}\n${n.text_preview || n.text?.slice(0, 500) || ''}`);
      const vectors = await embedTexts(texts, apiKey);
      noteEmbeddings = new Map();
      for (let i = 0; i < notes.length; i++) {
        noteEmbeddings.set(notes[i].id, vectors[i]);
      }
    }

    function cosineSimilarity(a, b) {
      let dot = 0, na = 0, nb = 0;
      for (let i = 0; i < a.length; i++) {
        dot += a[i] * b[i];
        na += a[i] * a[i];
        nb += b[i] * b[i];
      }
      return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9);
    }

    async function generateIdea(noteA, noteB) {
      const apiKey = getApiKey();
      if (!apiKey) return null;
      const model = 'gemini-3.1-flash-lite-preview';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      const prompt = `You are a creative knowledge synthesizer. Given two notes from a personal knowledge base, suggest ONE surprising but plausible connection or new idea that bridges them. Be specific and concise (2-3 sentences max).

Reply in this exact format:
TITLE: <a short 3-6 word title for the idea>
IDEA: <the idea text, 2-3 sentences>

Note A: "${noteA.name}"
${noteA.text_preview || noteA.text?.slice(0, 500) || ''}

Note B: "${noteB.name}"
${noteB.text_preview || noteB.text?.slice(0, 500) || ''}`;
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
      });
      if (!resp.ok) {
        console.error('Idea generation error:', resp.status, await resp.text());
        return null;
      }
      const data = await resp.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || null;
      if (!raw) return null;
      // Parse TITLE: and IDEA: from response
      const titleMatch = raw.match(/TITLE:\s*(.+)/i);
      const ideaMatch = raw.match(/IDEA:\s*([\s\S]+)/i);
      return {
        title: titleMatch ? titleMatch[1].trim() : null,
        text: ideaMatch ? ideaMatch[1].trim() : raw.trim(),
      };
    }

    function initPollenSystem() {
      if (!sceneState) return;
      const scene = sceneState.scene;
      const group = new THREE.Group();
      group.userData = { type: 'pollen' };

      const count = VFX.pollenCount.val;
      const size = VFX.pollenSize.val;
      const opacity = VFX.pollenOpacity.val;
      const dustRadius = getDustRadius();
      const particles = [];

      // Generate ✦ sprite texture once
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '48px serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('✦', 32, 34);
      const sparkTex = new THREE.CanvasTexture(canvas);

      const trailLen = VFX.pollenTrail.val;

      for (let i = 0; i < count; i++) {
        const mat = new THREE.SpriteMaterial({
          map: sparkTex,
          color: 0xfff8dc,
          transparent: true,
          opacity: opacity,
        });
        const mesh = new THREE.Sprite(mat);
        mesh.scale.setScalar(size * 3);
        // Random position within dust radius, at canopy height (y = 3–8)
        const angle = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * dustRadius * 0.8;
        const startX = Math.cos(angle) * r;
        const startY = 3 + Math.random() * 5;
        const startZ = Math.sin(angle) * r;
        mesh.position.set(startX, startY, startZ);
        group.add(mesh);

        // Trail — fat dashed line strip behind the particle (Line2)
        const trailPositions = new Float32Array(trailLen * 3);
        for (let t = 0; t < trailLen; t++) {
          trailPositions[t * 3]     = startX;
          trailPositions[t * 3 + 1] = startY;
          trailPositions[t * 3 + 2] = startZ;
        }
        const trailGeo = new LineGeometry();
        trailGeo.setPositions(trailPositions);
        const trailMat = new LineMaterial({
          color: 0xfff8dc,
          transparent: true,
          opacity: opacity * 0.5,
          linewidth: VFX.pollenTrailWidth.val,
          dashed: true,
          dashSize: VFX.pollenDash.val,
          gapSize: VFX.pollenGap.val,
          dashScale: 1,
          resolution: new THREE.Vector2(window.innerWidth, window.innerHeight),
        });
        const trailLine = new Line2(trailGeo, trailMat);
        trailLine.computeLineDistances();
        group.add(trailLine);

        particles.push({
          mesh,
          vel: { x: 0, y: 0, z: 0 },
          visited: new Map(),
          triggered: false,
          pulseTimer: 0,
          trailLine,
          trailPositions,
          trailHead: 0,
          trailTimer: 0,
        });
      }

      scene.add(group);
      pollenSystem = { group, particles };
      computePlantBounds();
      computeNotesByPlant();
    }

    const _defaultPollenColor = new THREE.Color(0xfff8dc);
    const _targetColor = new THREE.Color();
    const _currentColor = new THREE.Color();
    const _center = new THREE.Vector3();
    const _pollenBaseScale = () => VFX.pollenSize.val * 3;

    function updatePollenSystem(delta) {
      if (!pollenSystem) return;
      pollenTime += delta * 0.15; // slow time evolution
      const speed = VFX.pollenSpeed.val;
      const dustRadius = getDustRadius();
      const particles = pollenSystem.particles;
      const detectR = XPOLLEN.detectRadius.val;

      // Guided mode: check if 2+ plants are pinned
      const guided = pinnedLeaders.length >= 2;
      if (guided && !updatePollenSystem._guidedLogged) {
        updatePollenSystem._guidedLogged = true;
        console.log(`%cGuided pollination active`, 'color: #FF9800; font-weight: bold',
          `\n  Pinned plants: ${pinnedLeaders.map(p => p.idx).join(', ')}`,
          `\n  Pinned count: ${pinnedLeaders.length}`,
          `\n  Embeddings loaded: ${!!noteEmbeddings} (${noteEmbeddings ? noteEmbeddings.size : 0} vectors)`);
      }
      if (!guided) updatePollenSystem._guidedLogged = false;
      let pinnedSet = null;
      if (guided) {
        pinnedSet = new Set(pinnedLeaders.map(pl => pl.idx));
      }

      // Use plant bounding boxes for both seeking and proximity detection
      const candidatePlants = guided
        ? plantBounds.filter(pb => pinnedSet.has(pb.plantIndex))
        : plantBounds;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const pos = p.mesh.position;

        // Curl noise velocity (base drift) — slow down when paused
        const effSpeed = pollenPaused ? speed * 0.15 : speed;
        const curl = curlNoise3D(pos.x * 0.15, pos.y * 0.15, pos.z * 0.15, pollenTime);
        p.vel.x = curl.x * effSpeed;
        p.vel.y = curl.y * effSpeed * 0.3;
        p.vel.z = curl.z * effSpeed;

        // Seek a plant bounding box from a DIFFERENT plant than what we've already visited
        if (candidatePlants.length > 0 && !pollenPaused) {
          // Pick/refresh target plant: must be one we haven't visited yet
          if (!p._targetPlant || p._targetPlant.box.distanceToPoint(pos) < detectR * 0.5) {
            const visitedPlants = p.visited;
            let bestPB = null, bestDist = Infinity;
            for (const pb of candidatePlants) {
              if (visitedPlants.has(pb.plantIndex)) continue;
              pb.box.getCenter(_center);
              const d = pos.distanceTo(_center);
              if (d < bestDist) { bestDist = d; bestPB = pb; }
            }
            if (!bestPB) {
              bestPB = candidatePlants[Math.floor(Math.random() * candidatePlants.length)];
            }
            p._targetPlant = bestPB;
          }
          // Steer toward target plant's bounding box center
          p._targetPlant.box.getCenter(_center);
          const dx = _center.x - pos.x, dy = _center.y - pos.y, dz = _center.z - pos.z;
          const d = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.01;
          const attract = guided ? speed * 0.7 : speed * 0.4;
          const drift = guided ? 0.2 : 0.5;
          p.vel.x = p.vel.x * drift + (dx / d) * attract;
          p.vel.y = p.vel.y * drift + (dy / d) * attract;
          p.vel.z = p.vel.z * drift + (dz / d) * attract;
        }

        // Update position
        pos.x += p.vel.x * delta;
        pos.y += p.vel.y * delta;
        pos.z += p.vel.z * delta;

        // Clamp vertical — allow pollen to reach ground-level leaves
        if (pos.y < 0.5) pos.y = 0.5;
        if (pos.y > 20) pos.y = 20;

        // Wrap around horizontally
        const dist = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
        if (dist > dustRadius) {
          pos.x = -pos.x * 0.8;
          pos.z = -pos.z * 0.8;
          // Reset trail to new position on wrap
          const tp = p.trailPositions;
          const tLen = tp.length / 3;
          for (let t = 0; t < tLen; t++) {
            tp[t * 3] = pos.x; tp[t * 3 + 1] = pos.y; tp[t * 3 + 2] = pos.z;
          }
          p.trailHead = 0;
          p.trailLine.geometry.setPositions(tp);
          p.trailLine.computeLineDistances();
        }

        // Update trail — shift oldest point to current position
        p.trailTimer += delta;
        if (p.trailTimer >= 0.06) {
          p.trailTimer = 0;
          const tp = p.trailPositions;
          const tLen = tp.length / 3;
          for (let t = tLen - 1; t > 0; t--) {
            tp[t * 3]     = tp[(t - 1) * 3];
            tp[t * 3 + 1] = tp[(t - 1) * 3 + 1];
            tp[t * 3 + 2] = tp[(t - 1) * 3 + 2];
          }
          tp[0] = pos.x; tp[1] = pos.y; tp[2] = pos.z;
          p.trailLine.geometry.setPositions(tp);
          p.trailLine.computeLineDistances();
          p.trailLine.material.color.copy(p.mesh.material.color);
        }

        // Plant bounding box proximity check
        let nearPlant = false;
        // When paused: fade to default color and shrink
        if (pollenPaused) {
          p.mesh.material.color.lerp(_defaultPollenColor, delta * 3);
          const ps = _pollenBaseScale() * 0.3;
          p.mesh.scale.lerp(new THREE.Vector3(ps, ps, ps), delta * 4);
        } else {
          for (let j = 0; j < candidatePlants.length; j++) {
            const pb = candidatePlants[j];
            if (pb.box.distanceToPoint(pos) < detectR) {
              nearPlant = true;
              _targetColor.set(pb.leafColor);
              p.mesh.material.color.lerp(_targetColor, delta * 3);
              // Pick a random noteId from this plant
              const ids = notesByPlant[pb.plantIndex];
              if (ids && ids.length > 0) {
                const noteId = ids[Math.floor(Math.random() * ids.length)];
                p.visited.set(pb.plantIndex, { noteId, plantName: pb.plantName });
              }
              break;
            }
          }

          if (!nearPlant) {
            p.mesh.material.color.lerp(_defaultPollenColor, delta * 1.5);
          }
        }

        // Log first cross-plant visit for any particle (once per particle)
        if (p.visited.size === 1 && nearPlant && !p._firstVisitLogged) {
          p._firstVisitLogged = true;
          const [pi, info] = [...p.visited.entries()][0];
          console.log(`Pollen ${i}: first leaf detected! plant=${info.plantName} noteId=${info.noteId} — now seeking different plant`);
        }
        if (p.visited.size >= 2 && !p._crossLogged) {
          p._crossLogged = true;
          const plants = [...p.visited.values()].map(v => v.plantName);
          console.log(`%cPollen ${i}: reached 2 plants! [${plants.join(', ')}]`, 'color: #FF9800; font-weight: bold');
        }

        // Cross-pollination: visited.size >= 2 means 2+ different plants guaranteed
        if (p.visited.size >= 2 && !p.triggered) {
          const entries = [...p.visited.entries()];
          // Pick last two different-plant entries
          const pairA = { plantIndex: entries[entries.length - 1][0], noteId: entries[entries.length - 1][1].noteId, plantName: entries[entries.length - 1][1].plantName };
          const pairB = { plantIndex: entries[entries.length - 2][0], noteId: entries[entries.length - 2][1].noteId, plantName: entries[entries.length - 2][1].plantName };

          if (pairA && pairB) {
            const sortedKey = pairA.noteId < pairB.noteId
              ? `${pairA.noteId}:${pairB.noteId}` : `${pairB.noteId}:${pairA.noteId}`;

            if (seenPairs.has(sortedKey)) {
              p.visited.clear();
            } else if (!noteEmbeddings) {
              console.warn('Pollen: no embeddings — provide API key to enable cross-pollination');
              p.visited.clear();
            } else if (pollenPaused) {
              // Paused — don't clear visited, just skip this frame
            } else if (ideaCount >= XPOLLEN.ideaLimit.val) {
              p.visited.clear();
            } else if (Date.now() - lastIdeaTime < XPOLLEN.ideaInterval.val * 1000) {
              // Throttle: wait between idea triggers
              p.visited.clear();
            } else {
              const embA = noteEmbeddings.get(pairA.noteId);
              const embB = noteEmbeddings.get(pairB.noteId);

              if (!embA || !embB) {
                console.warn(`Pollen: missing embedding for ${!embA ? pairA.noteId : pairB.noteId}`);
              }
              if (embA && embB) {
                const sim = cosineSimilarity(embA, embB);
                const simMin = guided ? XPOLLEN.simMinGuided.val : XPOLLEN.simMin.val;
                const simMax = guided ? XPOLLEN.simMaxGuided.val : XPOLLEN.simMax.val;

                if (sim >= simMin && sim <= simMax) {
                  // Increment immediately to enforce cap across concurrent triggers
                  ideaCount++;
                  lastIdeaTime = Date.now();
                  updatePollenStatus();
                  p.triggered = true;
                  seenPairs.add(sortedKey);
                  p.pulseTimer = 0.5;
                  console.log(`%c✦ Cross-pollination ${ideaCount}/${XPOLLEN.ideaLimit.val|0}`, 'color: #4CAF50; font-weight: bold',
                    `\n  ${pairA.plantName}/${pairA.noteId} × ${pairB.plantName}/${pairB.noteId}\n  similarity: ${sim.toFixed(3)} (range: ${simMin}–${simMax})`);

                  // Trigger starburst VFX
                  const burstPos = pos.clone();
                  const nearestLeafColor = _targetColor.clone();
                  createStarburst(burstPos, nearestLeafColor);

                  // Fire LLM idea generation (async, non-blocking)
                  const noteA = noteById[pairA.noteId];
                  const noteB = noteById[pairB.noteId];
                  if (noteA && noteB) {
                    generateIdea(noteA, noteB).then(result => {
                      if (result) {
                        pollenIdeas.unshift({
                          noteNames: [noteA.name, noteB.name],
                          title: result.title,
                          text: result.text,
                          similarity: sim,
                          timestamp: Date.now(),
                        });
                        const colorA = plantBounds.find(pb => pb.plantIndex === pairA.plantIndex)?.leafColor || '#fff';
                        const colorB = plantBounds.find(pb => pb.plantIndex === pairB.plantIndex)?.leafColor || '#fff';
                        showIdea(noteA.name, noteB.name, pairA.plantName, pairB.plantName, result.title, result.text, burstPos, colorA, colorB);
                      }
                    }).catch(e => console.error('Idea generation failed:', e));
                  }
                  p.visited.clear();
                } else {
                  // Similarity outside range — mark this pair as seen so we don't spam logs
                  seenPairs.add(sortedKey);
                  console.log(`Pollen: pair skipped (sim=${sim.toFixed(3)}, range: ${simMin}–${simMax})`,
                    pairA.noteId, '×', pairB.noteId);
                  p.visited.clear();
                }
              } else {
                p.visited.clear();
              }
            }
            p.triggered = false;
          }
          // Prevent visited from growing unbounded (cap at 6 plants)
          if (p.visited.size > 6) {
            const keys = [...p.visited.keys()];
            for (let k = 0; k < keys.length - 3; k++) p.visited.delete(keys[k]);
          }
        }

        // Pulse animation (brief scale-up when cross-pollination triggers)
        if (!pollenPaused) {
          const bs = _pollenBaseScale();
          if (p.pulseTimer > 0) {
            p.pulseTimer -= delta;
            const t = Math.max(0, p.pulseTimer / 0.5);
            const s = bs * (1 + Math.sin(t * Math.PI) * 1.5);
            p.mesh.scale.setScalar(s);
          } else {
            p.mesh.scale.setScalar(bs);
          }
        }
      }

      // Update starbursts
      for (let i = pollenStarbursts.length - 1; i >= 0; i--) {
        const sb = pollenStarbursts[i];
        sb.timer += delta;
        const dur = XPOLLEN.ringDuration.val;
        const expand = XPOLLEN.ringExpandTime.val;
        // Total time = last ring appears + expand + hold, then all fade together
        const lastDelay = (sb.group.children.length - 1) * (XPOLLEN.ringDelay.val);
        const totalTime = lastDelay + expand + dur;
        const fadeStart = lastDelay + expand; // all rings visible, start fading
        if (sb.timer > totalTime) {
          sb.group.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
          sceneState.scene.remove(sb.group);
          pollenStarbursts.splice(i, 1);
        } else {
          // Global fade: all rings fade together after last one finishes expanding
          const globalOpacity = sb.timer > fadeStart
            ? Math.max(0, 1 - (sb.timer - fadeStart) / dur) : 1.0;
          sb.group.children.forEach(ring => {
            const delay = ring.userData._delay || 0;
            const t = sb.timer - delay;
            if (t < 0) {
              ring.scale.setScalar(0);
              ring.material.opacity = 0;
            } else if (t < expand) {
              ring.scale.setScalar(t / expand);
              ring.material.opacity = globalOpacity;
            } else {
              ring.scale.setScalar(1);
              ring.material.opacity = globalOpacity;
            }
          });
          if (sceneState.camera) {
            sb.group.quaternion.copy(sceneState.camera.quaternion);
          }
        }
      }
    }

    function refreshPollen() {
      if (!sceneState) return;
      const scene = sceneState.scene;
      // Remove old pollen group
      if (pollenSystem) {
        pollenSystem.group.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) child.material.dispose();
        });
        scene.remove(pollenSystem.group);
        pollenSystem = null;
      }
      initPollenSystem();
    }

    function createStarburst(position, color) {
      if (!sceneState) return;
      const group = new THREE.Group();
      group.position.copy(position);
      const count = XPOLLEN.ringCount.val;
      const baseR = XPOLLEN.ringRadius.val;
      const spacing = XPOLLEN.ringSpacing.val;
      const delay = XPOLLEN.ringDelay.val;
      for (let i = 0; i < count; i++) {
        const radius = baseR + i * spacing;
        const segments = 64;
        const points = [];
        for (let j = 0; j <= segments; j++) {
          const angle = (j / segments) * Math.PI * 2;
          points.push(new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius, 0));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const mat = i % 2 === 0
          ? new THREE.LineBasicMaterial({ color, transparent: true, opacity: 1.0, linewidth: 2 })
          : new THREE.LineDashedMaterial({ color, transparent: true, opacity: 1.0, linewidth: 2, dashSize: 0.3, gapSize: 0.2 });
        const ring = new THREE.Line(geo, mat);
        if (i % 2 === 1) ring.computeLineDistances();
        ring.userData._delay = i * delay;
        ring.scale.setScalar(0);
        group.add(ring);
      }
      sceneState.scene.add(group);
      pollenStarbursts.push({ group, timer: 0 });
    }

    const MAX_STACK_ITEMS = 10;
    let ideaDataStore = []; // full idea data for card display

    function showIdea(nameA, nameB, plantA, plantB, title, text, worldPos, colorA, colorB) {
      const stack = document.getElementById('idea-stack');
      const toast = document.getElementById('idea-toast');
      const leaderSvg = document.getElementById('idea-leader-line');

      // Prepare toast content
      toast.innerHTML = `<div style="padding-left:1.2em;text-indent:-1.2em">✦ <span style="color:${colorA || '#fff'}">${nameA}</span></div><div style="padding-left:1.2em;text-indent:-1.2em">✦ <span style="color:${colorB || '#fff'}">${nameB}</span></div>`;
      leaderSvg.classList.remove('visible');

      function showToastNow() {
        // Project worldPos with current (zoomed) camera
        if (worldPos && sceneState?.camera) {
          const projected = worldPos.clone().project(sceneState.camera);
          const hw = window.innerWidth / 2;
          const hh = window.innerHeight / 2 + 40;
          const sx = (projected.x * hw) + hw;
          const sy = -(projected.y * hh) + hh;
          const ringOffset = 40;
          toast.style.left = `${sx}px`;
          toast.style.top = `${sy + ringOffset}px`;
          toast.style.transform = 'translate(-50%, 0)';
        } else {
          toast.style.left = '50%';
          toast.style.top = '50%';
          toast.style.transform = 'translate(-50%, -50%)';
        }
        toast.classList.add('visible');
        setTimeout(() => { toast.classList.remove('visible'); leaderSvg.classList.remove('visible'); }, 3500);

        // Draw leader line now that toast is positioned
        requestAnimationFrame(() => {
          const toastRect = toast.getBoundingClientRect();
          const itemRect = item.getBoundingClientRect();
          if (toastRect.width && itemRect.width) {
            const toastCx = toastRect.left + toastRect.width / 2;
            if (toastCx > window.innerWidth / 2) {
              const x1 = toastRect.left;
              const y1 = toastRect.top + toastRect.height / 2;
              const x2 = itemRect.right;
              const y2 = itemRect.top + itemRect.height / 2;
              const cx = (x1 + x2) / 2;
              const path = leaderSvg.querySelector('path');
              path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
              leaderSvg.classList.add('visible');
            }
          }
        });
      }

      // Camera focus — show toast after zoom-in completes
      if (worldPos) {
        startCameraFocus(worldPos, showToastNow);
      } else {
        showToastNow();
      }

      // Store idea data
      const ideaIdx = ideaDataStore.length;
      ideaDataStore.push({ nameA, nameB, plantA, plantB, title, text, colorA, colorB });

      // Add stack item — use title if available, fallback to note pair
      const item = document.createElement('div');
      item.className = 'idea-stack-item';

    // ===================================================
    // Timeline Scrubber
    // ===================================================

    let _timelineNeedsRelayout = false;

    // Set targets — called on slider input (cheap)
    function updateTimelineVisibility() {
      const isFullRange = timelineDate >= timelineMaxDate || timelineDate === Infinity;

      for (const plant of plantGroups) {
        const grp = plant.userData?.groupData;
        if (!grp) continue;

        if (isFullRange) {
          plant.userData._targetGrowth = 1;
        } else {
          const visibleCount = grp.noteIds.filter(id => {
            const note = noteById[id];
            return note && (note.modifiedAt || 0) <= timelineDate;
          }).length;
          plant.userData._targetGrowth = grp.noteIds.length > 0 ? visibleCount / grp.noteIds.length : 0;
        }

        // Init currentGrowth if not set
        if (plant.userData._currentGrowth == null) {
          plant.userData._currentGrowth = plant.userData._targetGrowth;
        }

        // Trigger rays when target first reaches full growth
        const tg = plant.userData._targetGrowth;
        if (tg >= 1 && !plant.userData._raysTriggered) {
          plant.userData._raysTriggered = true;
          spawnRayBurst(plant);
        } else if (tg < 0.99) {
          plant.userData._raysTriggered = false;
        }
      }

      _timelineNeedsRelayout = true;
    }

    // Ray burst effect when a plant finishes growing
    function spawnRayBurst(plant) {
      if (!sceneState) return;
      const box = new THREE.Box3().setFromObject(plant);
      const top = new THREE.Vector3(
        (box.min.x + box.max.x) / 2,
        box.max.y,
        (box.min.z + box.max.z) / 2
      );

      const RAY_COUNT = 10;
      const RAY_LENGTH = 0.5;
      const RING_RADIUS = 3.2; // radius of the circle rays spawn from
      const group = new THREE.Group();
      group.position.copy(top);

      const rays = [];
      for (let i = 0; i < RAY_COUNT; i++) {
        const phi = (Math.PI * 2 * i) / RAY_COUNT + (Math.random() - 0.5) * 0.3;
        const theta = Math.PI * 0.15 + Math.random() * Math.PI * 0.25;
        const dir = new THREE.Vector3(
          Math.sin(theta) * Math.cos(phi),
          Math.cos(theta),
          Math.sin(theta) * Math.sin(phi)
        );
        const length = RAY_LENGTH * (0.7 + Math.random() * 0.6);

        // Origin on a ring around the plant top
        const origin = new THREE.Vector3(
          Math.cos(phi) * RING_RADIUS,
          0,
          Math.sin(phi) * RING_RADIUS
        );
        const points = [origin, origin.clone().add(dir.clone().multiplyScalar(length))];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({
          color: new THREE.Color(VFX.uiTextBright?.val || '#ffffff'),
          transparent: true,
          opacity: 0.9,
        });
        const line = new THREE.Line(geometry, material);
        line.scale.setScalar(0);
        group.add(line);
        rays.push({ line, material, targetLength: length });
      }

      sceneState.scene.add(group);
      rayEffects.push({ group, rays, age: 0, phase: 'grow' }); // grow → hold → fade
    }

    function animateRayEffects(delta) {
      const GROW_TIME = 0.6;
      const HOLD_TIME = 0.4;
      const FADE_TIME = 0.8;

      for (let i = rayEffects.length - 1; i >= 0; i--) {
        const fx = rayEffects[i];
        fx.age += delta;

        if (fx.phase === 'grow') {
          const t = Math.min(1, fx.age / GROW_TIME);
          const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
          for (const r of fx.rays) {
            r.line.scale.setScalar(eased);
          }
          if (t >= 1) { fx.phase = 'hold'; fx.age = 0; }
        } else if (fx.phase === 'hold') {
          if (fx.age >= HOLD_TIME) { fx.phase = 'fade'; fx.age = 0; }
        } else if (fx.phase === 'fade') {
          const t = Math.min(1, fx.age / FADE_TIME);
          const opacity = 0.9 * (1 - t);
          for (const r of fx.rays) {
            r.material.opacity = opacity;
          }
          if (t >= 1) {
            // Clean up
            sceneState.scene.remove(fx.group);
            fx.group.traverse(child => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });
            rayEffects.splice(i, 1);
          }
        }
      }
    }

    // Camera focus effect — zoom in on starburst, hold, then return
    const FOCUS_ZOOM_IN  = 1.2;  // seconds to zoom in
    const FOCUS_HOLD     = 3.0;  // seconds to hold
    const FOCUS_ZOOM_OUT = 1.5;  // seconds to zoom out
    const FOCUS_ZOOM_FACTOR = 1.5; // multiplier on current zoom

    function startCameraFocus(worldPos, onZoomedIn) {
      if (!sceneState) return;
      const { camera, controls } = sceneState;
      // Freeze controls so damping doesn't fight us
      controls.enabled = false;
      controls.autoRotate = false;
      cameraFocus = {
        targetPos: worldPos.clone(),
        origTarget: controls.target.clone(),
        origPosition: camera.position.clone(),
        origZoom: camera.zoom,
        peakZoom: camera.zoom * FOCUS_ZOOM_FACTOR,
        phase: 'in',
        timer: 0,
        onZoomedIn: onZoomedIn || null,
      };
    }

    function animateCameraFocus(delta, camera, controls) {
      if (!cameraFocus) return;
      const f = cameraFocus;
      f.timer += delta;

      if (f.phase === 'in') {
        const t = Math.min(f.timer / FOCUS_ZOOM_IN, 1);
        const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
        controls.target.lerpVectors(f.origTarget, f.targetPos, ease);
        camera.zoom = f.origZoom + (f.peakZoom - f.origZoom) * ease;
        camera.updateProjectionMatrix();
        if (t >= 1) {
          f.phase = 'hold';
          f.timer = 0;
          if (f.onZoomedIn) f.onZoomedIn();
        }
      } else if (f.phase === 'hold') {
        // Keep target pinned during hold
        controls.target.copy(f.targetPos);
        if (f.timer >= FOCUS_HOLD) { f.phase = 'out'; f.timer = 0; }
      } else if (f.phase === 'out') {
        const t = Math.min(f.timer / FOCUS_ZOOM_OUT, 1);
        const ease = 1 - Math.pow(1 - t, 2); // ease-out quadratic
        controls.target.lerpVectors(f.targetPos, f.origTarget, ease);
        camera.position.lerpVectors(camera.position, f.origPosition, ease * 0.1 + 0.02);
        camera.zoom = f.peakZoom + (f.origZoom - f.peakZoom) * ease;
        camera.updateProjectionMatrix();
        if (t >= 1) {
          // Hard-restore to exact original state
          controls.target.copy(f.origTarget);
          camera.zoom = f.origZoom;
          camera.updateProjectionMatrix();
          controls.enabled = true;
          controls.autoRotate = true;
          controls.update();
          cameraFocus = null;
        }
      }
    }

    // Animate — called every frame from render loop
    function animateTimelineGrowth(delta) {
      if (!plantGroups.length) return;

      const speed = 1.0; // lerp speed (higher = faster)
      let anyMoving = false;

      for (const plant of plantGroups) {
        const grp = plant.userData?.groupData;
        if (!grp) continue;

        const target = plant.userData._targetGrowth;
        if (target == null) continue;

        let current = plant.userData._currentGrowth ?? target;

        // Lerp toward target
        if (Math.abs(current - target) > 0.001) {
          current += (target - current) * Math.min(1, delta * speed);
          plant.userData._currentGrowth = current;
          anyMoving = true;
        } else if (current !== target) {
          current = target;
          plant.userData._currentGrowth = current;
        } else {
          continue; // no change needed
        }

        const maxDepth = plant.userData.maxDepth || 1;
        const depthLevels = maxDepth + 1;

        plant.traverse(child => {
          if (child.userData?.type === 'branch') {
            const d = child.userData.depth;
            const depthStart = d / depthLevels;
            const depthEnd = (d + 1) / depthLevels;
            // Branch appears as growth crosses its depth band
            const branchGrowth = Math.max(0, Math.min(1, (current - depthStart) / (depthEnd - depthStart)));
            child.visible = branchGrowth > 0;
            // Scale branch along its length for growing effect
            if (child.visible) {
              child.scale.setScalar(branchGrowth);
            }
          } else if (child.userData?.type === 'leaf' && child.userData.noteId != null) {
            const note = noteById[child.userData.noteId];
            const noteDate = note ? (note.modifiedAt || 0) : 0;
            const shouldShow = (timelineDate >= timelineMaxDate || timelineDate === Infinity) || noteDate <= timelineDate;
            if (shouldShow) {
              child.visible = true;
              // Scale leaf based on how "grown" its depth band is
              const d = child.userData._depth ?? maxDepth;
              const depthStart = d / depthLevels;
              const depthEnd = (d + 1) / depthLevels;
              const leafGrowth = Math.max(0, Math.min(1, (current - depthStart) / (depthEnd - depthStart)));
              const s = leafGrowth * leafGrowth; // ease-in for pop effect
              child.scale.setScalar(s);
              child.visible = s > 0.01;
            } else {
              child.visible = false;
            }
          }
        });

        const hasAny = current > 0.001;
        plant.visible = hasAny && !(hideSingles && grp.noteIds.length <= 1);
      }

      // Relayout labels once when targets change, not every frame
      if (_timelineNeedsRelayout) {
        _timelineNeedsRelayout = false;
        relayoutLabels();
      }
    }

    function initTimeline(notes) {
      const dates = notes.map(n => n.modifiedAt || 0).filter(d => d > 0);
      if (dates.length < 2) return;

      timelineMinDate = Math.min(...dates);
      timelineMaxDate = Math.max(...dates);
      timelineDate = timelineMaxDate;

      const slider = document.getElementById('timeline-slider');
      const minLabel = document.getElementById('timeline-date-min');
      const maxLabel = document.getElementById('timeline-date-max');
      const currentLabel = document.getElementById('timeline-current');

      const fmtDate = ms => new Date(ms).toLocaleDateString('en-US', { year: 'numeric', month: 'short' });

      minLabel.textContent = fmtDate(timelineMinDate);
      maxLabel.textContent = fmtDate(timelineMaxDate);
      currentLabel.textContent = fmtDate(timelineMaxDate);

      slider.value = 1000;

      let timelineRAF = null;
      slider.addEventListener('input', () => {
        const t = parseInt(slider.value) / 1000;
        timelineDate = timelineMinDate + t * (timelineMaxDate - timelineMinDate);
        currentLabel.textContent = new Date(timelineDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

        // Update current label position to follow thumb
        const pct = slider.value / 1000;
        const sliderRect = slider.getBoundingClientRect();
        const thumbX = sliderRect.left + pct * sliderRect.width;
        const timelineRect = document.getElementById('timeline').getBoundingClientRect();
        currentLabel.style.left = (thumbX - timelineRect.left) + 'px';
        currentLabel.style.transform = 'translateX(-50%)';

        // Fast path: just toggle visibility, no geometry rebuild
        if (!timelineRAF) {
          timelineRAF = requestAnimationFrame(() => {
            updateTimelineVisibility();
            timelineRAF = null;
          });
        }
      });

      document.getElementById('top-transport').classList.remove('hidden');

      // Initialize growth targets so animation system is ready
      updateTimelineVisibility();
    }

    // ===================================================
    // Pipeline Orchestration
    // ===================================================

    async function runPipeline(notes, fingerprint) {
      try {
        // Reset cross-pollination state
        seenPairs.clear();
        ideaCount = 0;
        lastIdeaTime = 0;
        updatePollenStatus();
        pollenIdeas = [];
        document.getElementById('idea-stack').classList.add('hidden');
        document.getElementById('idea-stack').innerHTML = '';
        ideaDataStore = [];
        closeIdeaCard();

        // STAGE 1: SCANNING
        setBootStage('SCANNING...', `${notes.length} NOTES LOADED`);
        await sleep(300);

        // STAGE 2: GROUPING
        setBootStage('GROUPING...', `MODE: ${groupingMode.toUpperCase()}`);
        await sleep(50);

        const groups = groupingMode === 'tag' ? groupByTag(notes) : groupBySubfolder(notes);
        allGroups = groups;
        cachedPlantStyles = {};

        setBootStage('GROUPING...', `${groups.length} GROUPS`);
        await sleep(500);

        // STAGE 2.5: EMBEDDING (optional, requires API key)
        try {
          await ensureEmbeddings(notes);
        } catch (e) {
          console.warn('Embedding skipped:', e.message);
          noteEmbeddings = null;
        }

        // STAGE 3: PLANTING
        setBootStage('PLANTING...', 'GENERATING L-SYSTEMS');
        await sleep(50);

        // Build note lookup
        noteById = {};
        notes.forEach(n => { noteById[n.id] = n; });

        // Render garden
        plantGroups = renderGarden(sceneState.scene, groups, notes);
        buildSideLabels(groups);
        refreshDust();
        refreshPollen();

        // Auto-frame camera
        autoFrameCamera(sceneState.camera, sceneState.controls, plantGroups);

        // Update stats
        updateStats(groups.length, notes.length);

        // Show re-analyze button
        document.getElementById('reanalyze-btn').classList.remove('hidden');

        // Initialize timeline
        initTimeline(notes);

        // STAGE 4: ONLINE
        setBootStage(`GARDEN ONLINE // ${groups.length} PLANTS // ${notes.length} NOTES`, '');
        setTimeout(hideBootStatus, 2000);

        // Cache session (include embeddings if available)
        const embeddingsData = {};
        if (noteEmbeddings) {
          for (const [id, vec] of noteEmbeddings) embeddingsData[id] = Array.from(vec);
        }
        await saveSession({
          notes: notes.map(n => ({
            id: n.id, filename: n.filename, name: n.name,
            text: n.text, text_preview: n.text_preview, modifiedAt: n.modifiedAt,
            subfolder: n.subfolder, tags: n.tags,
          })),
          groups,
          groupingMode,
          noteCount: notes.length,
          plantCount: groups.length,
          fingerprint: fingerprint || '',
          embeddings: Object.keys(embeddingsData).length ? embeddingsData : undefined,
        });

      } catch (err) {
        setBootStage('ERROR', err.message);
        console.error('Pipeline error:', err);
      }
    }

    // ===================================================
    // Restore from Cache
    // ===================================================

    function restoreFromCache(session) {
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');

      if (!sceneState) {
        sceneState = initScene();
      }

      setBootStage('RESTORING...', `${session.noteCount || '?'} NOTES`);

      const { notes, groups } = session;
      if (session.groupingMode) groupingMode = session.groupingMode;

      // Restore embeddings if available
      if (session.embeddings) {
        noteEmbeddings = new Map();
        for (const [id, arr] of Object.entries(session.embeddings)) {
          const key = isNaN(id) ? id : Number(id);
          noteEmbeddings.set(key, new Float32Array(arr));
        }
      } else {
        noteEmbeddings = null;
      }
      // Reset cross-pollination state
      seenPairs.clear();
      ideaCount = 0;
      lastIdeaTime = 0;
      pollenIdeas = [];
      document.getElementById('idea-stack').classList.add('hidden');
      document.getElementById('idea-stack').innerHTML = '';
      ideaDataStore = [];
      closeIdeaCard();

      cachedPlantStyles = {};

      // Build note lookup
      noteById = {};
      notes.forEach(n => { noteById[n.id] = n; });

      allGroups = groups;

      // Render garden
      plantGroups = renderGarden(sceneState.scene, groups, notes);
      buildSideLabels(groups);
      refreshDust();
      refreshPollen();
      initTimeline(notes);

      autoFrameCamera(sceneState.camera, sceneState.controls, plantGroups);

      updateStats(groups.length, notes.length);

      // Show re-analyze button
      document.getElementById('reanalyze-btn').classList.remove('hidden');

      // Update mode selector UI
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === groupingMode);
      });

      setBootStage(`GARDEN RESTORED // ${groups.length} PLANTS // ${notes.length} NOTES`, '');
      setTimeout(hideBootStatus, 2000);
    }

    // ===================================================
    // Setup Screen Wiring
    // ===================================================

    const pickFolderBtn = document.getElementById('pick-folder-btn');
    const pickFolderBtnNew = document.getElementById('pick-folder-btn-new');
    const setupStatus = document.getElementById('setup-status');

    // Track the last-picked dirHandle so re-analyze can re-read the same folder
    let lastDirHandle = null;

    // Mode selector wiring
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        groupingMode = btn.dataset.mode;
      });
    });

    async function handlePickFolder() {
      try {
        if (!window.showDirectoryPicker) {
          setupStatus.textContent = 'ERROR: BROWSER DOES NOT SUPPORT FOLDER PICKER (USE CHROME)';
          return;
        }
        setupStatus.textContent = 'WAITING FOR FOLDER SELECTION...';
        const { dirHandle, folderName, filenames } = await pickFolder();
        setupStatus.textContent = 'SCANNING...';
        if (filenames.length === 0) {
          setupStatus.textContent = 'ERROR: NO .MD OR .TXT FILES FOUND';
          return;
        }
        lastDirHandle = dirHandle;
        setupStatus.textContent = `FOUND ${filenames.length} NOTES`;

        // Check cache for matching folder + mode
        const fp = folderFingerprint(folderName, filenames);
        const session = await loadSession().catch(() => null);
        if (session && session.fingerprint === fp && session.groupingMode === groupingMode) {
          setupStatus.textContent = `CACHE HIT \u2014 RESTORING ${session.noteCount || '?'} NOTES`;
          await sleep(300);
          restoreFromCache(session);
          return;
        }

        // No cache match — read full content and run pipeline
        setupStatus.textContent = `READING ${filenames.length} NOTES...`;
        const notes = await readNotesFromHandle(dirHandle);
        if (notes.length === 0) {
          setupStatus.textContent = 'ERROR: ALL FILES WERE EMPTY';
          return;
        }
        setupStatus.textContent = `LOADED ${notes.length} NOTES`;

        document.getElementById('setup').classList.add('hidden');
        document.getElementById('main').classList.remove('hidden');

        // Initialize scene
        if (!sceneState) {
          sceneState = initScene();
        }

        runPipeline(notes, fp);
      } catch (err) {
        if (err.name === 'AbortError') return; // user cancelled picker
        setupStatus.textContent = 'ERROR: ' + err.message.toUpperCase();
      }
    }
    pickFolderBtn.addEventListener('click', handlePickFolder);
    pickFolderBtnNew.addEventListener('click', handlePickFolder);

    // ===================================================
    // Auto-load from preload.json (skip folder picker)
    // ===================================================

    const urlParams = new URLSearchParams(location.search);
    const filterCluster = urlParams.get('cluster');
    const filterTag = urlParams.get('tag');

    async function loadFromPreload() {
      try {
        const resp = await fetch('../graph/preload.json');
        if (!resp.ok) return false;
        const data = await resp.json();
        let nodes_raw = data.graphNodes || [];

        // Apply URL param filters
        if (filterCluster !== null) {
          const cid = parseInt(filterCluster);
          nodes_raw = nodes_raw.filter(n => n.cluster_id === cid);
        }
        if (filterTag !== null) {
          nodes_raw = nodes_raw.filter(n => (n.tags || []).some(t => t === filterTag || t.startsWith(filterTag + '/')));
        }

        if (nodes_raw.length === 0) return false;

        // Map to garden note schema
        const notes = nodes_raw.map((node, i) => {
          let modifiedAt = 0;
          if (node.created) {
            const d = new Date(node.created);
            if (!isNaN(d.getTime())) modifiedAt = d.getTime();
          }
          return {
            id: i,
            filename: node.filename,
            name: node.name || node.filename.replace(/\.md$/, ''),
            text: node.text_preview || '',
            text_preview: (node.text_preview || '').slice(0, 300),
            modifiedAt,
            subfolder: node.cluster_name || '',
            tags: node.tags || [],
          };
        });

        // Use subfolder (cluster) grouping by default
        groupingMode = 'subfolder';

        // Hide setup, show main
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('main').classList.remove('hidden');

        if (!sceneState) {
          sceneState = initScene();
        }

        runPipeline(notes, 'preload-' + Date.now());
        return true;
      } catch (e) {
        console.warn('preload.json load failed:', e);
        return false;
      }
    }

    // Try preload.json first; fall back to normal folder picker flow
    loadFromPreload();

    // Load from cache (resume button)
    loadCacheBtn.addEventListener('click', async () => {
      try {
        setupStatus.textContent = 'LOADING CACHED SESSION...';
        const session = await loadSession();
        if (!session) {
          setupStatus.textContent = 'ERROR: NO CACHED SESSION FOUND';
          return;
        }
        restoreFromCache(session);
      } catch (err) {
        setupStatus.textContent = 'ERROR: ' + err.message.toUpperCase();
      }
    });

    // Re-analyze button
    document.getElementById('reanalyze-btn').addEventListener('click', async () => {
      // Clear current garden
      if (sceneState) {
        clearGarden(sceneState.scene);
      }
      hideDetailCard();
      selectedNoteId = null;
      allGroups = [];
      noteById = {};

      showBootStatus();
      setBootStage('RE-ANALYZING...', 'READING NOTES');

      try {
        let dirHandle = lastDirHandle;
        if (!dirHandle) {
          // No stored handle — ask user to pick again
          const result = await pickFolder();
          dirHandle = result.dirHandle;
          lastDirHandle = dirHandle;
        }

        // Re-request permission (handles may go stale)
        try {
          await dirHandle.requestPermission({ mode: 'read' });
        } catch {
          // Permission denied or stale — re-pick
          const result = await pickFolder();
          dirHandle = result.dirHandle;
          lastDirHandle = dirHandle;
        }

        const notes = await readNotesFromHandle(dirHandle);
        if (notes.length === 0) {
          setBootStage('ERROR', 'ALL FILES WERE EMPTY');
          return;
        }

        const filenames = notes.map(n => n.filename).sort();
        const fp = folderFingerprint(dirHandle.name, filenames);

        await runPipeline(notes, fp);
      } catch (err) {
        if (err.name === 'AbortError') return;
        setBootStage('ERROR', err.message);
        console.error('Re-analyze error:', err);
      }
    });

  </script>
</body>
</html>
