<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>Garden — Malachi Mabie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===================================================
       CSS Custom Properties
       =================================================== */
    :root {
      --bg: #0a0a0f;
      --bg-panel: rgba(8, 8, 7, 0.88);
      --border: #616161;
      --text: #f2ece3;
      --text-dim: #d6d7d0;
      --text-bright: #d5d4d3;

      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Mono', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --blue: #d07b1b;
      --cyan: #d4a843;
      --light-cyan: #e8c46a;
      --indigo: #c47a43;
      --amber: #d4a843;
      --panel-width: 360px;
    }

    /* ===================================================
       Reset & Base
       =================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    :focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    :focus:not(:focus-visible) {
      outline: none;
    }

    .hidden {
      display: none !important;
    }

    /* ===================================================
       Setup Screen
       =================================================== */
    #setup {
      width: 100vw;
      height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #setup-title {
      width: 700px;
      margin-bottom: 4px;
    }
    #setup-title img {
      width: 100%;
      height: auto;
    }

    #setup-subtitle {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: -10px;
      margin-bottom: 24px;
    }

    #mode-selector {
      display: flex;
      gap: 0;
      width: 320px;
    }

    .mode-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 8px 0;
      cursor: pointer;
      transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
    }

    .mode-btn:first-child {
      border-right: none;
    }

    .mode-btn:hover {
      color: var(--text);
      border-color: var(--blue);
    }

    .mode-btn.active {
      background: var(--border);
      color: var(--bg);
      border-color: var(--border);
    }

    #setup-welcome {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    #setup-welcome.hidden { display: none; }

    #setup-actions-returning {
      display: flex;
      gap: 8px;
      width: 320px;
    }
    #setup-actions-returning.hidden { display: none; }
    #setup-actions-new.hidden { display: none; }

    #load-cache-btn {
      flex: 1;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--bg);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
    }
    #load-cache-btn:hover {
      background: var(--text-dim);
      border-color: var(--text-dim);
      color: var(--bg);
    }

    #pick-folder-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease;
    }
    #pick-folder-btn:hover {
      border-color: var(--text);
      color: var(--text-bright);
    }

    #pick-folder-btn-new {
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--bg);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      padding: 12px 24px;
      width: 320px;
      box-sizing: border-box;
      cursor: pointer;
      transition: background 200ms ease, color 200ms ease, border-color 200ms ease;
    }
    #pick-folder-btn-new:hover {
      background: var(--text-dim);
      border-color: var(--text-dim);
      color: var(--bg);
    }

    #setup-options {
      width: 320px;
      margin-top: 8px;
    }
    #setup-options-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      opacity: 0.5;
      text-align: center;
      margin-bottom: 12px;
      position: relative;
    }
    #setup-options-label::before,
    #setup-options-label::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
      opacity: 0.4;
    }
    #setup-options-label::before { left: 0; }
    #setup-options-label::after { right: 0; }
    #setup-options-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #api-key-row {
      width: 320px;
      margin-bottom: 4px;
    }
    #api-key-row label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 4px;
      display: block;
    }
    #api-key-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 8px 12px;
      box-sizing: border-box;
      transition: border-color 200ms ease;
    }
    #api-key-input:focus {
      border-color: var(--blue);
      outline: none;
    }
    #api-key-input::placeholder {
      color: var(--text-dim);
      opacity: 0.5;
    }

    #setup-status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      min-height: 1.4em;
      margin-top: 8px;
    }

    /* ===================================================
       Main View
       =================================================== */

    /* -- Scene container -- */
    #scene-container {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }

    #scene-container canvas {
      display: block;
    }

    /* -- Top Bar -- */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      pointer-events: none;
    }

    #top-bar-title {
      opacity: 0.6;
      margin-top: 55px;
      margin-left: -5px;
    }
    #top-bar-title img {
      height: 50px;
      width: auto;
    }

    #top-bar-stats {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #reanalyze-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      padding: 4px 12px;
      cursor: pointer;
      pointer-events: auto;
      transition: color 150ms ease, border-color 150ms ease;
    }

    #reanalyze-btn:hover {
      color: var(--text-bright);
      border-color: var(--text);
    }

    /* -- Boot Status Overlay -- */
    #boot-status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    #boot-stage {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text);
    }

    #boot-detail {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    /* -- Side Panel (Detail Card) -- */
    #detail-card {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--panel-width);
      height: 100vh;
      overflow-y: auto;
      background: rgb(8, 8, 7);
      z-index: 110;
      border-left: 1px solid var(--border);
      padding: 20px;
      transform: translateX(100%);
      transition: transform 300ms ease;
    }

    #detail-card.visible {
      transform: translateX(0);
    }

    /* -- Panel Resize Handle -- */
    #panel-resize {
      position: fixed;
      top: 0;
      width: 5px;
      height: 100vh;
      cursor: col-resize;
      z-index: 21;
      background: transparent;
      transition: background 150ms ease;
      display: none;
    }

    #panel-resize:hover,
    #panel-resize.dragging {
      background: var(--blue);
    }

    /* Scrollbar styling for detail card */
    #detail-card::-webkit-scrollbar {
      width: 4px;
    }

    #detail-card::-webkit-scrollbar-track {
      background: transparent;
    }

    #detail-card::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: 0.04em;
      word-break: break-word;
    }

    #card-close {
      background: transparent;
      border: none;
      border-radius: 0;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 16px;
      cursor: pointer;
      padding: 0 0 0 8px;
      line-height: 1;
      transition: color 200ms ease;
      flex-shrink: 0;
    }

    #card-close:hover {
      color: var(--text-bright);
    }

    #card-cluster {
      margin-bottom: 10px;
    }

    .cluster-badge {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 0;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      color: var(--text);
    }

    #card-hierarchy {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 10px;
    }

    .hierarchy-row {
      display: flex;
      gap: 8px;
      font-size: 11px;
      line-height: 1.6;
      margin-bottom: 2px;
    }

    .hierarchy-key {
      font-family: var(--mono);
      color: var(--text-dim);
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .hierarchy-val {
      font-family: var(--sans);
      color: var(--text);
      word-break: break-word;
    }

    #card-preview {
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #card-connections {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 10px;
    }

    .conn-header {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .conn-item {
      font-size: 11px;
      line-height: 1.4;
      padding: 8px 0;
      border-bottom: 1px solid rgba(205, 109, 19, 0.15);
    }

    .conn-item:last-child {
      border-bottom: none;
    }

    .conn-name {
      font-family: var(--mono);
      color: var(--text);
      display: block;
      font-size: 11px;
      cursor: pointer;
      transition: color 150ms ease;
    }

    .conn-name:hover {
      color: var(--text-bright);
    }

    .conn-label {
      font-family: var(--sans);
      font-style: italic;
      color: var(--text-dim);
      font-size: 10px;
      display: block;
      margin-top: 2px;
    }

    /* ===================================================
       Plant & Hover Labels (CSS2D)
       =================================================== */
    .plant-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      pointer-events: none;
    }

    .hover-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-bright);
      background: var(--bg-panel);
      padding: 4px 8px;
      border: 1px solid var(--border);
      white-space: nowrap;
      pointer-events: none;
    }

    .hover-date {
      display: block;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    /* ===================================================
       Side Labels & Leader Lines
       =================================================== */
    .side-labels {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      transition: transform 800ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    #side-labels-left.collapsed {
      transform: translateX(-100%);
      pointer-events: none !important;
    }
    #side-labels-right.collapsed {
      transform: translateX(100%);
      pointer-events: none !important;
    }
    .side-labels.collapsed .side-label {
      pointer-events: none !important;
    }

    #labels-collapse-toggle {
      position: fixed;
      top: 50%;
      left: 8px;
      transform: translateY(-50%);
      z-index: 20;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 8px 4px;
      cursor: pointer;
      pointer-events: auto;
      writing-mode: vertical-lr;
      text-orientation: mixed;
      transition: color 150ms, border-color 150ms, left 400ms ease;
    }
    #labels-collapse-toggle:hover {
      color: var(--text-bright);
      border-color: var(--text);
    }
    #labels-collapse-toggle.collapsed {
      color: var(--text-bright);
      border-color: var(--text-bright);
    }

    .side-label {
      position: absolute;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 3px 6px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
      transition: color 150ms, border-color 150ms, background 150ms, top 400ms ease, left 400ms ease, right 400ms ease, opacity 300ms ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .side-label:hover {
      color: var(--text-bright);
      background: rgba(205, 109, 19, 0.08);
    }
    .side-label.active,
    .side-label.pinned {
      color: var(--text-bright);
      border-color: var(--border);
      background: rgba(205, 109, 19, 0.1);
    }

    #leader-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9;
      transition: opacity 400ms ease;
    }
    #leader-lines.collapsed {
      opacity: 0;
    }

    /* ===================================================
       Timeline Scrubber
       =================================================== */
    #timeline {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .timeline-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    #timeline-current {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-bright);
      white-space: nowrap;
      letter-spacing: 0.05em;
      pointer-events: none;
    }
    #timeline-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 300px;
      height: 3px;
      background: var(--border);
      outline: none;
      border-radius: 1px;
    }
    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-bright);
      cursor: pointer;
      border: 1px solid var(--border);
    }
    #timeline-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-bright);
      cursor: pointer;
      border: 1px solid var(--border);
    }

    /* ===================================================
       VFX Config Panel
       =================================================== */
    #top-transport {
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      pointer-events: auto;
    }
    #top-transport.hidden { display: none; }
    .transport-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 18px;
    }
    .transport-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }
    #xpollen-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #xpollen-controls button {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      cursor: pointer;
      transition: color 150ms, border-color 150ms;
    }
    #xpollen-controls button:hover {
      color: var(--text-bright);
      border-color: var(--text);
    }
    #xpollen-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.5;
      margin-left: 4px;
    }
    #xpollen-hint {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 8px 12px;
      white-space: nowrap;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #xpollen-hint.hidden { display: none; }
    #xpollen-hint-dismiss {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 2px 6px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }
    #xpollen-hint-dismiss:hover {
      color: var(--text-bright);
      border-color: var(--text);
    }
    #hide-singles-toggle.active {
      color: var(--text-bright);
      border-color: var(--text-bright);
    }

    #dev-buttons {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 99;
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }
    #dev-buttons.hidden { display: none; }
    #dev-buttons button {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 6px 14px;
      cursor: pointer;
      pointer-events: auto;
      transition: color 150ms, border-color 150ms;
    }
    #dev-buttons button:hover {
      color: var(--text-bright);
      border-color: var(--text);
    }

    #pollen-popover {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 6px;
      z-index: 101;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 12px 16px;
      font-family: var(--mono);
      width: 310px;
      box-sizing: border-box;
    }
    #pollen-popover.hidden { display: none; }
    .pollen-popover-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pollen-popover-row:last-child { margin-bottom: 0; }
    .pollen-popover-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pollen-popover-val {
      font-size: 10px;
      color: var(--text-bright);
      min-width: 32px;
      text-align: right;
      flex-shrink: 0;
    }
    .pollen-popover-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;

  <!-- ===================================================
       CDN Imports via Import Map
       =================================================== -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

    // ===================================================
    // Cluster Colors
    // ===================================================
    const CLUSTER_COLORS = ['#c45c3e', '#d4a843', '#a8523a', '#c47a43', '#8b3a2a',
                            '#d07b1b', '#b85c2f', '#c9963a', '#9e6b3a', '#d4783c'];

    // ===================================================
    // Module-Level State
    // ===================================================
    let hoveredLeaf = null;
    let selectedNoteId = null;
    let hoverLabelObj = null;
    let noteById = {};
    let plantGroups = [];
    let cachedPlantStyles = {};
    let allGroups = [];
    let groupingMode = 'subfolder';
    let activeLeaderIdx = -1;
    let activeLeaderLabel = null;
    let activeLeaderSide = null;
    let pinnedLeaders = []; // array of { idx, label, side }
    let pollenSystem = null;  // { group, particles: [{mesh, vel, visited: Set, triggered: bool}] }
    let plantBounds = [];     // cached [{box: THREE.Box3, leafColor: string, plantIndex: number, plantName: string}]
    let timelineMinDate = 0;
    let timelineMaxDate = 0;
    let timelineDate = Infinity; // current cutoff date (ms), Infinity = show all
    let rayEffects = [];  // active ray burst effects
    let pollenIdeas = [];     // [{plantNames: [string, string], text: string, timestamp}]
    let noteEmbeddings = null;      // Map<noteId, Float32Array> — cached embeddings
    let notesByPlant = {};          // { plantIndex: [noteId, ...] } — for random leaf selection on cross-pollination
    let seenPairs = new Set();      // "noteId1:noteId2" (sorted) — deduplication
    let ideaCount = 0;              // current session idea count
    let lastIdeaTime = 0;           // timestamp of last idea trigger (for throttling)
    let pollenPaused = true;        // pause cross-pollination API calls (default: paused)
    let pollenStarbursts = [];      // active starburst effects [{group, timer}]
    let pollenTime = 0;       // accumulated time for curl noise
    let labelsCollapsed = false;
    let _lastLabelZoneWidth = 0;

    // Camera focus effect state
    let cameraFocus = null; // { targetPos, origTarget, origZoom, phase, timer }

    // ===================================================
    // IndexedDB Cache
    // ===================================================
    const DB_NAME = 'idea-garden-cache';
    const DB_VERSION = 2;
    const STORE_NAME = 'sessions';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (db.objectStoreNames.contains(STORE_NAME)) db.deleteObjectStore(STORE_NAME);
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function saveSession(data) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put({ id: 'latest', ...data, savedAt: Date.now() });
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function loadSession() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get('latest');
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    // Check for cached session on load — toggle between returning/new user UI
    const loadCacheBtn = document.getElementById('load-cache-btn');
    const welcomeEl = document.getElementById('setup-welcome');
    const actionsReturning = document.getElementById('setup-actions-returning');
    const actionsNew = document.getElementById('setup-actions-new');
    loadSession().then(session => {
      if (session) {
        const noteCount = session.noteCount || '?';
        welcomeEl.textContent = `welcome back — ${noteCount} notes`;
        welcomeEl.classList.remove('hidden');
        actionsReturning.classList.remove('hidden');
        actionsNew.classList.add('hidden');
      }
    }).catch(() => {});

    // ===================================================
    // YAML Frontmatter Tag Parser
    // ===================================================

    function parseFrontmatterDate(text) {
      if (!text.startsWith('---')) return null;
      const end = text.indexOf('\n---', 3);
      if (end === -1) return null;
      const frontmatter = text.slice(4, end);
      // Try common date fields: date, created, created_at, dateCreated
      const dateKeys = /^(?:date|created|created_at|dateCreated|date_created)\s*:\s*(.+)/mi;
      const match = frontmatter.match(dateKeys);
      if (!match) return null;
      const val = match[1].trim().replace(/^['"]|['"]$/g, '');
      const parsed = new Date(val);
      return isNaN(parsed.getTime()) ? null : parsed.getTime();
    }

    function parseFrontmatterTags(text) {
      if (!text.startsWith('---')) return [];
      const end = text.indexOf('\n---', 3);
      if (end === -1) return [];
      const frontmatter = text.slice(4, end);

      const lines = frontmatter.split('\n');
      let tagsIdx = -1;
      for (let i = 0; i < lines.length; i++) {
        if (/^tags\s*:/.test(lines[i])) {
          tagsIdx = i;
          break;
        }
      }
      if (tagsIdx === -1) return [];

      const afterColon = lines[tagsIdx].replace(/^tags\s*:\s*/, '');

      // Bracket format: [tag1, tag2]
      if (afterColon.startsWith('[')) {
        const closeBracket = afterColon.indexOf(']');
        const inner = closeBracket !== -1 ? afterColon.slice(1, closeBracket) : afterColon.slice(1);
        return inner.split(',').map(t => t.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
      }

      // Inline comma-separated: tag1, tag2
      if (afterColon.trim()) {
        return afterColon.split(',').map(t => t.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
      }

      // List format on following lines: - tag
      const tags = [];
      for (let i = tagsIdx + 1; i < lines.length; i++) {
        const m = lines[i].match(/^\s+-\s+(.+)/);
        if (m) {
          tags.push(m[1].trim().replace(/^['"]|['"]$/g, ''));
        } else if (/^\S/.test(lines[i])) {
          break;
        }
      }
      return tags;
    }

    // ===================================================
    // Folder Picker & Note Reading
    // ===================================================

    async function pickFolder() {
      const dirHandle = await window.showDirectoryPicker();
      const filenames = [];
      const subfolders = [];

      // Capture direct child directories (skip hidden dirs like .obsidian)
      for await (const entry of dirHandle.values()) {
        if (entry.kind === 'directory' && !entry.name.startsWith('.')) {
          subfolders.push(entry.name);
        }
      }

      async function scanDir(handle) {
        for await (const entry of handle.values()) {
          if (entry.kind === 'file') {
            const name = entry.name.toLowerCase();
            if (name.endsWith('.md') || name.endsWith('.txt')) filenames.push(entry.name);
          } else if (entry.kind === 'directory' && !entry.name.startsWith('.')) {
            await scanDir(entry);
          }
        }
      }

      await scanDir(dirHandle);
      filenames.sort();
      subfolders.sort();
      return { dirHandle, folderName: dirHandle.name, filenames, subfolders };
    }

    async function readNotesFromHandle(dirHandle) {
      const notes = [];
      let id = 0;

      async function readDir(handle, subfolder = '') {
        for await (const entry of handle.values()) {
          if (entry.kind === 'file') {
            const name = entry.name.toLowerCase();
            if (name.endsWith('.md') || name.endsWith('.txt')) {
              const file = await entry.getFile();
              const text = await file.text();
              if (text.trim()) {
                const trimmed = text.trim();
                const preview = trimmed.slice(0, 300);
                notes.push({
                  id: id++,
                  filename: entry.name,
                  name: entry.name.replace(/\.(md|txt)$/i, ''),
                  text: trimmed,
                  text_preview: preview,
                  modifiedAt: parseFrontmatterDate(trimmed) || file.lastModified,
                  subfolder,
                  tags: parseFrontmatterTags(trimmed),
                });
              }
            }
          } else if (entry.kind === 'directory' && !entry.name.startsWith('.')) {
            // Track immediate child dir name; deeper nesting keeps the top-level
            await readDir(entry, subfolder || entry.name);
          }
        }
      }

      await readDir(dirHandle);
      return notes;
    }

    function folderFingerprint(folderName, filenames) {
      return folderName + '::' + filenames.join('|');
    }

    // ===================================================
    // Filesystem Grouping
    // ===================================================

    function groupBySubfolder(notes) {
      const map = {};
      for (const note of notes) {
        const key = note.subfolder || '(root)';
        if (!map[key]) map[key] = [];
        map[key].push(note);
      }

      return Object.entries(map).map(([name, groupNotes]) => ({
        name,
        noteIds: groupNotes
          .sort((a, b) => (a.modifiedAt || 0) - (b.modifiedAt || 0))
          .map(n => n.id),
        mode: 'subfolder',
      }));
    }

    function groupByTag(notes) {
      const map = {};
      for (const note of notes) {
        const tags = note.tags && note.tags.length > 0 ? note.tags : ['(untagged)'];
        for (const tag of tags) {
          if (!map[tag]) map[tag] = [];
          map[tag].push(note);
        }
      }

      return Object.entries(map).map(([name, groupNotes]) => ({
        name,
        noteIds: groupNotes
          .sort((a, b) => (a.modifiedAt || 0) - (b.modifiedAt || 0))
          .map(n => n.id),
        mode: 'tag',
      }));
    }

    function initScene() {
      const container = document.getElementById('scene-container');

      // Scene
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);

      // Camera — orthographic, elevated, looking across the garden
      const frustum = 20;
      const aspect = window.innerWidth / window.innerHeight;
      const camera = new THREE.OrthographicCamera(
        -frustum * aspect, frustum * aspect,
        frustum, -frustum,
        0.1, 1000
      );
      camera.position.set(0, 8, 18);
      camera.zoom = 2.0;
      camera.lookAt(0, 3, 0);

      // WebGL Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      // CSS2D Renderer — for floating labels
      const css2dRenderer = new CSS2DRenderer();
      css2dRenderer.setSize(window.innerWidth, window.innerHeight);
      css2dRenderer.domElement.style.position = 'absolute';
      css2dRenderer.domElement.style.top = '0';
      css2dRenderer.domElement.style.left = '0';
      css2dRenderer.domElement.style.pointerEvents = 'none';
      container.appendChild(css2dRenderer.domElement);

      // OrbitControls
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.autoRotate = true;
      controls.autoRotateSpeed = -0.3;
      controls.target.set(0, 3, 0);
      controls.update();

      // Post-processing — bloom
      const composer = new EffectComposer(renderer);
      const renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.4,   // strength
        0.3,   // radius
        0.85   // threshold
      );
      composer.addPass(bloomPass);

      // Ground plane — scattered dust triangles
      const dustGroup = new THREE.Group();
      dustGroup.userData = { type: 'dust' };
      const dustCount = 600;
      const dustRadius = 30;
      const dustColor = new THREE.Color(VFX.dustColor.val);
      for (let i = 0; i < dustCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * dustRadius;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const size = 0.04 + Math.random() * 0.12;
        const triGeo = new THREE.BufferGeometry();
        const h = size, hw = size * 0.5;
        triGeo.setAttribute('position', new THREE.Float32BufferAttribute([
          -hw, 0, 0,   hw, 0, 0,   0, 0, h
        ], 3));
        const triMat = new THREE.MeshBasicMaterial({
          color: dustColor,
          transparent: true,
          opacity: 0.06 + Math.random() * 0.08,
          side: THREE.DoubleSide,
        });
        const tri = new THREE.Mesh(triGeo, triMat);
        tri.position.set(x, 0.01, z);
        tri.rotation.y = Math.random() * Math.PI * 2;
        dustGroup.add(tri);
      }
      scene.add(dustGroup);

      // Ambient light
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      // Directional light for subtle depth
      const dirLight = new THREE.DirectionalLight(0xffeab8, 0.3);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      // Resize handler
      function onResize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const a = w / h;
        camera.left = -frustum * a;
        camera.right = frustum * a;
        camera.top = frustum;
        camera.bottom = -frustum;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
        css2dRenderer.setSize(w, h);
        composer.setSize(w, h);
        bloomPass.resolution.set(w, h);
        // Update Line2 material resolutions for fat lines
        if (pollenSystem) {
          for (const p of pollenSystem.particles) {
            p.trailLine.material.resolution.set(w, h);
          }
        }
      }
      window.addEventListener('resize', onResize);

      // Wire interaction listeners once (on the container, not per-pipeline-run)
      container.addEventListener('mousemove', onMouseMove);
      container.addEventListener('click', onClick);

      // Update leader line on camera movement
      controls.addEventListener('change', () => {
        redrawAllLeaderLines();
      });

      // Animation loop
      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (pollenSystem) updatePollenSystem(delta);
        animateTimelineGrowth(delta);
        animateRayEffects(delta);
        animateCameraFocus(delta, camera, controls);
        controls.update();
        composer.render();
        css2dRenderer.render(scene, camera);
      }
      animate();

      return { scene, camera, renderer, css2dRenderer, controls, composer, bloomPass };
    }
